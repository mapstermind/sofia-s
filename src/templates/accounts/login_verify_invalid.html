{% extends "base.html" %}

{% block title %}Invalid Login Link — SOFIA-S{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4 text-center">
    <div class="card shadow border-0">
      <div class="card-body p-4 p-md-5">
        <i class="fas fa-triangle-exclamation fa-4x text-warning mb-3"></i>
        <h2 class="h4 mb-3">Invalid Login Link</h2>
        <p class="text-muted">{{ error }}</p>
        <p class="text-muted small">
          Login links expire after 15 minutes and can only be used once.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-2">
          <i class="fas fa-rotate-right me-2"></i>Request a New Link
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
