{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SOFIA-S{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="{% static 'css/custom.css' %}" rel="stylesheet">
</head>
<body>
{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{% url 'sheets:dashboard' %}">
      <i class="fas fa-table-cells me-2"></i>SOFIA-S
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'sheets:dashboard' %}">
            <i class="fas fa-gauge-high me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'sheets:spreadsheet_list' %}">
            <i class="fas fa-table me-1"></i>Spreadsheets
          </a>
        </li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item">
          <span class="nav-link text-muted">{{ user.email }}</span>
        </li>
        <li class="nav-item">
          <form method="post" action="{% url 'accounts:logout' %}" class="d-inline m-0">
            {% csrf_token %}
            <button type="submit" class="btn btn-link nav-link px-2">
              <i class="fas fa-right-from-bracket me-1"></i>Logout
            </button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>
{% endif %}

<main class="container-fluid py-4">
  {% include "partials/messages.html" %}
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="{% static 'js/charts.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
