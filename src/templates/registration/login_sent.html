{% extends "base.html" %}

{% block title %}Check Your Email — SOFIA-S{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4 text-center">
    <div class="card shadow border-0">
      <div class="card-body p-4 p-md-5">
        <i class="fas fa-envelope-open-text fa-4x text-primary mb-3"></i>
        <h2 class="h4 mb-3">Check Your Email</h2>
        <p class="text-muted">
          If that email address is registered, we've sent you a login link.
          The link expires in <strong>15 minutes</strong>.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-outline-secondary mt-2">
          <i class="fas fa-arrow-left me-2"></i>Back to Sign In
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
