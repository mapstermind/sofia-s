{% extends "base.html" %}

{% block title %}Sign In — SOFIA-S{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow border-0">
      <div class="card-body p-4 p-md-5">
        <h1 class="h3 card-title text-center mb-4">
          <i class="fas fa-right-to-bracket me-2 text-primary"></i>Sign In
        </h1>
        <p class="text-muted text-center small mb-4">
          Enter your email and we'll send you a one-time login link.
        </p>
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label for="{{ form.email.id_for_label }}" class="form-label">Email Address</label>
            <input
              type="email"
              class="form-control{% if form.email.errors %} is-invalid{% endif %}"
              id="{{ form.email.id_for_label }}"
              name="{{ form.email.html_name }}"
              value="{{ form.email.value|default:'' }}"
              placeholder="you@example.com"
              autofocus
              required
            >
            {% for error in form.email.errors %}
            <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="fas fa-paper-plane me-2"></i>Send Login Link
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
